      - region [ref=e256]:
        - generic [ref=e257]:
          - heading "Questions? Answered." [level=2] [ref=e258]
          - generic [ref=e259]:
            - generic [ref=e260]:
              - button "What exactly is Sparrow?" [expanded] [ref=e261]
              - paragraph [ref=e266]: Sparrow is a browser extension that overlays a design toolkit on any webpage. You can inspect the CSS behind any element, measure spacing, extract colors, fonts, and assets, and pin feedback directly on the live page all without opening DevTools or taking a single screenshot.
            - generic [ref=e267]:
              - button "Do I need a technical background to use it?" [ref=e268]
              - paragraph [ref=e271]: "No. Designers and clients use Sparrow without writing any code hovering shows you fonts, colors, and sizes in plain terms, and leaving feedback is just click and type. Developers get the deeper layers too: the full CSS cascade, Tailwind class detection, and copy-ready code."
            - generic [ref=e272]:
              - button "Is there a free plan?" [ref=e273]
              - paragraph [ref=e276]: Yes, and it doesn't expire. Free includes the full CSS inspector, the ruler, the website color overview, and 3 annotations per site per day. Paid plans add site-wide color and font swapping, asset downloads, color format switching, and higher annotation limits.
            - generic [ref=e277]:
              - button "How much does a paid plan cost?" [ref=e278]
              - paragraph [ref=e281]: Pro is $9/month ($90/year) and unlocks site-wide color and font swapping, asset downloads, color format switching, and 10 annotations per site per day. Max is $19/month ($190/year) and adds unlimited annotations and unlimited client review links. Paying yearly works out to two months free versus monthly.
            - generic [ref=e282]:
              - button "Can I upgrade, downgrade, or cancel anytime?" [ref=e283]
              - paragraph [ref=e286]: Yes. You can switch between Free, Pro, and Max whenever you like, and manage everything — invoices, payment methods, cancellations — from your account portal. If you cancel, you keep your paid features until the end of the billing period you've already paid for, then drop back to Free automatically.
            - generic [ref=e287]:
              - button "What happens to my annotations if I hit the plan limit?" [ref=e288]
              - paragraph [ref=e291]: Annotation limits are per site and reset every 24 hours (3 a day on Free, 10 on Pro, unlimited on Max). Reaching the limit only pauses adding new pins on that site for the day, your existing annotations are always saved and stay fully editable and shareable.
            - generic [ref=e292]:
              - button "Will Sparrow change or break the websites I use it on?" [ref=e293]
              - paragraph [ref=e296]: Never. Everything Sparrow does — including recoloring a page or swapping its fonts is a local preview that only you see. The real website is untouched, and one click resets any experiment.
            - generic [ref=e297]:
              - button "How does sharing feedback work?" [ref=e298]
              - paragraph [ref=e301]: Pin your comments, click Share, and send the link. Anyone who opens it sees your annotations in place on the page and can reply or resolve items with live cursors when you're reviewing together. Share links expire after 3 days for safety, but your annotations are saved and you can mint a fresh link anytime.
            - generic [ref=e302]:
              - button "Can clients mess up my annotations?" [ref=e303]
              - paragraph [ref=e306]: "No. People who join through your link enter Client Mode: they can comment, reply, and change an item's status, but they can't edit or delete your notes."
            - generic [ref=e307]:
              - button "Which sites and environments does it work on?" [ref=e308]
              - paragraph [ref=e311]: "Any page your browser can open: live production sites, staging environments, and localhost. There's nothing to install on the website itself."
            - generic [ref=e312]:
              - button "Does it understand Tailwind CSS?" [ref=e313]
              - paragraph [ref=e316]: Yes, When an element is styled with Tailwind utilities, Sparrow shows the class list separately from the rest of the CSS and lets you copy the classes in one click.
            - generic [ref=e317]:
              - button "I want to test my own brand font. Is uploading it safe?" [ref=e318]
              - paragraph [ref=e321]: Yes, uploaded fonts are registered directly in your browser and are never sent to a server. They apply for your current session only.

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="theme-color" content="#faf7f0" />
  <!-- Per-route <title>, description, canonical, and Open Graph/Twitter tags are
       emitted by <Seo> (src/components/seo/Seo.tsx) via React 19's native
       metadata hoisting, and baked into each page by scripts/prerender.mjs.
       Deliberately no static <title> here: it would duplicate the one <Seo>
       renders in the prerendered <head>. -->

  <!-- Structured data (site-wide). Baked into every prerendered page. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://trysparrowcss.com/#organization",
        "name": "Sparrow",
        "url": "https://trysparrowcss.com",
        "logo": "https://trysparrowcss.com/sparrow-logo.png"
      },
      {
        "@type": "WebSite",
        "@id": "https://trysparrowcss.com/#website",
        "name": "Sparrow",
        "url": "https://trysparrowcss.com",
        "publisher": { "@id": "https://trysparrowcss.com/#organization" }
      },
      {
        "@type": "SoftwareApplication",
        "name": "Sparrow",
        "url": "https://trysparrowcss.com",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Chrome, Firefox, Edge",
        "description": "Inspect the CSS behind any element, measure spacing, extract colors, fonts, and assets, and pin feedback directly on the live page — no DevTools, no screenshots.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    ]
  }
  </script>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZJPS32X5DB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-ZJPS32X5DB');
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>

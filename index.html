<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="theme-color" content="#faf7f0" />
  <!-- FALLBACK title/description, served whenever a page isn't prerendered
       (dev, or the prerender step was skipped in CI). At runtime main.tsx
       strips these before React mounts and <Seo> (src/components/seo/Seo.tsx)
       re-emits the per-route set — that same strip runs during the prerender
       crawl, so snapshotted pages also end up with exactly one set of tags. -->
  <title>Sparrow — Inspect CSS, Annotate & Review Any Website</title>
  <meta name="description" content="Sparrow is a browser extension for inspecting CSS, measuring spacing, extracting colors, fonts, and assets, and leaving pinned feedback on any live website. Free to start." />

  <!-- Structured data (site-wide). Baked into every prerendered page. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://trysparrowcss.com/#organization",
        "name": "Sparrow",
        "url": "https://trysparrowcss.com",
        "logo": "https://trysparrowcss.com/sparrow-logo.png"
      },
      {
        "@type": "WebSite",
        "@id": "https://trysparrowcss.com/#website",
        "name": "Sparrow",
        "url": "https://trysparrowcss.com",
        "publisher": { "@id": "https://trysparrowcss.com/#organization" }
      },
      {
        "@type": "SoftwareApplication",
        "name": "Sparrow",
        "url": "https://trysparrowcss.com",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Chrome, Firefox, Edge",
        "description": "Inspect the CSS behind any element, measure spacing, extract colors, fonts, and assets, and pin feedback directly on the live page — no DevTools, no screenshots.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    ]
  }
  </script>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZJPS32X5DB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-ZJPS32X5DB');
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
